name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint, type-check, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app-starter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: android-app-starter/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx vue-tsc --noEmit
      - run: npm run test:unit -- --run

  backend:
    name: Backend (syntax, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app-starter-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: android-app-starter-backend/package-lock.json
      - run: npm ci
      - run: find src -name '*.js' -exec node --check {} +
      - run: npm test -- --run
